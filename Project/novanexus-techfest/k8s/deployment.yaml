apiVersion: apps/v1
kind: Deployment

metadata:
  name: novanexus-techfest

spec:
  replicas: 2

  selector:
    matchLabels:
      app: novanexus-techfest

  template:
    metadata:
      labels:
        app: novanexus-techfest

    spec:
      containers:
        - name: novanexus-techfest
          image: novanexus-techfest:v2g
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8081
            - containerPort: 9090